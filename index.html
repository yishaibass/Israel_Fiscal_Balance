<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ישראל — החשבון הפיסקלי של שלושת המגזרים, 2018 ← 2023</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#1a1f29; --muted:#6b7280; --line:#e3e6ea; --paper:#ffffff; --bg:#f6f7f9;
    --blue:#1f5fa6; --blue-soft:#7fa8d0; --amber:#c8841a; --amber-soft:#e0b673;
    --pos:#2e7d57; --neg:#b4452f; --navy:#2b3a55; --grey:#aab1bb;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Arial","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;}
  .sans{font-family:"Arial","Helvetica Neue",sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:40px 32px 80px;}
  header{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:8px;}
  h1{font-size:30px;line-height:1.15;margin:0 0 6px;letter-spacing:-0.01em;}
  .kicker{font-family:"Arial","Helvetica Neue",sans-serif;text-transform:uppercase;
    letter-spacing:.08em;font-size:11px;color:var(--blue);font-weight:700;margin-bottom:10px;}
  .sub{color:var(--muted);font-size:14px;max-width:760px;margin:0;}
  /* top tabs */
  .tabs{display:flex;gap:2px;margin:22px 0 0;border-bottom:1px solid var(--line);}
  .tabs button{font-family:"Arial","Helvetica Neue",sans-serif;border:0;background:none;cursor:pointer;
    font-size:13px;font-weight:700;color:var(--muted);padding:10px 18px;border-bottom:2px solid transparent;
    margin-bottom:-1px;letter-spacing:.02em;}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--ink);}
  .toolbar{display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin:22px 0 6px;}
  section{margin-top:34px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:22px 24px;
    box-shadow:0 1px 2px rgba(16,24,40,.04);}
  h2{font-size:15px;font-family:"Arial","Helvetica Neue",sans-serif;font-weight:700;margin:0 0 2px;
    letter-spacing:.01em;}
  .cap{color:var(--muted);font-size:12.5px;margin:2px 0 16px;font-family:"Arial","Helvetica Neue",sans-serif;}
  .chartbox{position:relative;width:100%;}
  .grid2{display:grid;grid-template-columns:1.55fr 1fr;gap:22px;}
  .heroRow{display:grid;grid-template-columns:1.857fr 1fr;gap:22px;align-items:stretch;}
  .gapblock{margin:0 0 16px;padding:0 0 16px;border-bottom:1px solid var(--line);}
  .gapblock:last-child{margin-bottom:0;padding-bottom:0;border-bottom:0;}
  .gapblock .nm{font-family:"Arial","Helvetica Neue",sans-serif;font-weight:700;font-size:12.5px;
    color:var(--ink);margin-bottom:4px;}
  .gapblock .g23{font-size:28px;font-weight:700;line-height:1;letter-spacing:-0.02em;
    font-family:"Arial","Helvetica Neue",sans-serif;direction:ltr;unicode-bidi:embed;display:inline-block;}
  .gapblock .g18{font-family:"Arial","Helvetica Neue",sans-serif;font-size:12.5px;color:var(--muted);
    margin-top:4px;font-weight:600;}
  .gapblock .lbl{font-family:"Arial","Helvetica Neue",sans-serif;font-size:11.5px;color:var(--muted);margin-top:2px;}
  .secbtns-slim{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px;}
  .secbtns-slim button{font-family:"Arial","Helvetica Neue",sans-serif;cursor:pointer;
    border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 18px;
    font-size:12.5px;font-weight:700;color:var(--muted);}
  .secbtns-slim button.on{border-color:var(--ink);background:var(--ink);color:#fff;}
  .secbtns{display:flex;gap:10px;flex-wrap:wrap;}
  .secbtns button{font-family:"Arial","Helvetica Neue",sans-serif;cursor:pointer;border:1px solid var(--line);
    background:#fff;border-radius:9px;padding:12px 18px;text-align:right;min-width:190px;}
  .secbtns button .nm{font-weight:700;font-size:14px;}
  .secbtns button .vv{font-size:12px;color:var(--muted);margin-top:3px;}
  .secbtns button.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--ink) inset;}
  .pill{display:inline-block;font-family:"Arial","Helvetica Neue",sans-serif;font-size:11px;font-weight:700;
    padding:2px 8px;border-radius:20px;}
  .pill.io-in{background:#eaf1f9;color:var(--blue);}
  .pill.io-out{background:#fbf1e1;color:var(--amber);}
  .big{font-size:40px;font-weight:700;line-height:1;letter-spacing:-0.02em;font-family:"Arial","Helvetica Neue",sans-serif;
    direction:ltr;unicode-bidi:embed;display:inline-block;}
  .big.sub{font-size:13px;color:var(--muted);font-weight:600;direction:rtl;}
  .headline{display:flex;gap:26px;align-items:flex-end;flex-wrap:wrap;margin:4px 0 14px;}
  .demo{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .metric{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fcfcfd;}
  .metric .k{font-family:"Arial","Helvetica Neue",sans-serif;font-size:11px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--muted);font-weight:700;text-align:right;}
  .metric .v{font-family:"Arial","Helvetica Neue",sans-serif;font-size:26px;font-weight:700;margin-top:4px;
    direction:ltr;unicode-bidi:embed;display:block;}
  .metric .v small{font-size:13px;color:var(--grey);font-weight:600;margin-right:8px;}
  .earnbar{display:flex;height:16px;border-radius:5px;overflow:hidden;margin-top:8px;border:1px solid var(--line);direction:ltr;}
  .earnbar i{display:block;height:100%;}
  .earnleg{font-family:"Arial","Helvetica Neue",sans-serif;font-size:11px;color:var(--muted);display:flex;
    gap:14px;margin-top:7px;flex-wrap:wrap;}
  .earnleg b{color:var(--ink);}
  .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-left:5px;vertical-align:middle;}
  /* financial table — RTL: label col rightmost, numbers flow left */
  .fintbl{width:100%;border-collapse:collapse;font-family:"Arial","Helvetica Neue",sans-serif;
    font-variant-numeric:tabular-nums;font-size:13px;}
  .fintbl caption{text-align:right;}
  .fintbl thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    font-weight:700;padding:7px 10px;border-bottom:1.5px solid var(--ink);text-align:right;white-space:nowrap;}
  .fintbl thead th.rght{text-align:right;}
  .fintbl tbody td{padding:7px 10px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;}
  .fintbl tbody td.rght{text-align:right;color:var(--ink);}
  .fintbl tbody tr.tot td{border-top:1.5px solid var(--ink);border-bottom:0;font-weight:700;color:var(--ink);}
  .fintbl tbody tr.tot td.rght{text-transform:uppercase;font-size:11.5px;letter-spacing:.04em;}
  .grp-in td.rght::before{content:"";display:inline-block;width:8px;height:8px;border-radius:2px;
    background:var(--blue);margin-left:8px;vertical-align:middle;opacity:.85;}
  .grp-out td.rght::before{content:"";display:inline-block;width:8px;height:8px;border-radius:2px;
    background:var(--amber);margin-left:8px;vertical-align:middle;opacity:.85;}
  .secthead td{padding:14px 10px 5px;font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.1em;color:var(--ink);text-align:right;}
  .secthead.t-in td{color:var(--blue);} .secthead.t-out td{color:var(--amber);}
  .chg-pos{color:var(--pos);} .chg-neg{color:var(--neg);}
  .sharecell{position:relative;}
  .sharebar{position:absolute;left:10px;top:50%;transform:translateY(-50%);height:8px;border-radius:2px;
    background:var(--line);opacity:.9;z-index:0;}
  .shareval{position:relative;z-index:1;}
  /* methodology */
  .method h3{font-family:"Arial","Helvetica Neue",sans-serif;font-size:13px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--blue);margin:22px 0 8px;font-weight:700;}
  .method h3:first-child{margin-top:0;}
  .method p,.method li{font-size:14px;line-height:1.7;color:var(--ink);margin:0 0 10px;}
  .method ul{margin:0 0 12px;padding-right:20px;padding-left:0;}
  .method .small{color:var(--muted);font-size:12.5px;font-family:"Arial","Helvetica Neue",sans-serif;}
  .method a{color:var(--blue);text-decoration:underline;}
  .method code{background:#f1f3f5;border-radius:4px;padding:1px 5px;font-size:12px;}
  .flag{border-right:3px solid var(--amber);border-left:0;background:#fdf8ef;
    padding:10px 14px;border-radius:8px 0 0 8px;margin:0 0 10px;font-size:13.5px;line-height:1.6;}
  .attrib{border-right:3px solid var(--blue);border-left:0;background:#f1f6fc;
    padding:12px 16px;border-radius:8px 0 0 8px;margin:0 0 14px;font-size:14px;line-height:1.6;}
  footer{margin-top:46px;border-top:1px solid var(--line);padding-top:16px;color:var(--muted);
    font-size:11.5px;font-family:"Arial","Helvetica Neue",sans-serif;line-height:1.55;}
  .hide{display:none;}
  details{margin-top:34px;}
  details summary{cursor:pointer;font-family:"Arial","Helvetica Neue",sans-serif;font-size:12.5px;
    font-weight:700;color:var(--muted);padding:12px 16px;background:var(--paper);border:1px solid var(--line);
    border-radius:12px;list-style:none;}
  details summary::-webkit-details-marker{display:none;}
  details summary::before{content:"◂ ";color:var(--blue);}
  details[open] summary::before{content:"▾ ";}
  details[open] summary{border-radius:12px 12px 0 0;border-bottom:0;}
  details section{margin-top:0;}
  details[open] section .card{border-radius:0 0 12px 12px;border-top:0;}
  .legend-inline{font-family:"Arial","Helvetica Neue",sans-serif;font-size:11.5px;color:var(--muted);
    display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;}
  @media(max-width:880px){.grid2,.demo,.heroRow{grid-template-columns:1fr;}}
</style>
</head>

<script>
/* ---- display name maps ---- */
const SECTOR_NAMES = {

const ITEM_NAMES = {
  "Income tax + cap gains":    "מס הכנסה + רווחי הון",

/* ---------- formatting ---------- */
const nf0 = new Intl.NumberFormat('en-US',{maximumFractionDigits:0});
const fmtNIS = v => '₪' + nf0.format(Math.round(v));
const fmtSign = v => (v>=0?'+':'−') + nf0.format(Math.abs(Math.round(v)));
/* per-household annual figures are stored as ₪/year; the dashboard shows them
   as ₪/household/month (÷12) to match the published paper's units. */
const fmtNISm  = v => fmtNIS(v/12);
const fmtSignM = v => fmtSign(v/12);
const fmtBnPlain = v => (v>=0?'':'−') + '₪' + Math.abs(v).toFixed(1) + 'B';
/* compact ₪1.2K-style formatter: always one decimal + K/M, no full-number branch */
const kSuffix = v => {
  const av = Math.abs(v);
  if(av>=1000000) return (av/1000000).toFixed(1)+'M';
  return (av/1000).toFixed(1)+'K';
};
const fmtK = v => '₪'+kSuffix(v);
const fmtSignK = v => (v>=0?'+':'−') + '₪' + kSuffix(v);
const fmtKm = v => fmtK(v/12);
const fmtSignKm = v => fmtSignK(v/12);
const fmtPct = v => (v>=0?'+':'−') + Math.abs(v).toFixed(0) + '%';
const C = getComputedStyle(document.documentElement);
const col = n => C.getPropertyValue(n).trim();
Chart.defaults.font.family = "'Arial','Helvetica Neue',sans-serif";
Chart.defaults.font.size = 12;
Chart.defaults.color = col('--muted');

/* ---------- real-terms (2018 ₪) dataset ---------- */
/* Cumulative CPI inflation 2018→2023 in Israel ≈ 10.6% (annual-average index
   chained 2019-2023: 1.008·0.994·1.015·1.044·1.042 ≈ 1.106). 2023 nominal ₪
   are deflated to 2018 ₪ by dividing by this factor. */
const CPI = 1.106;
function buildReal(src, cpi){
  const d = JSON.parse(JSON.stringify(src));
  const def = x => (x==null ? x : x/cpi);
  ['tax_bn','transfer_bn','net_bn','net_hh','tax_hh','transfer_hh'].forEach(k=>{
    if(d.state && d.state['2023'] && d.state['2023'][k]!=null) d.state['2023'][k]=def(src.state['2023'][k]);
  });
  d.sector_order.forEach(s=>{
    const S=d.sectors[s], O=src.sectors[s];
    ['net_hh','tax_hh','transfer_hh','total_fisc_bn','tax_bn','transfer_bn'].forEach(k=>{
      if(S[k] && S[k]['2023']!=null) S[k]['2023']=def(O[k]['2023']);
    });
    if(S.demo && S.demo.income_m && S.demo.income_m['2023']!=null)
      S.demo.income_m['2023']=def(O.demo.income_m['2023']);
    ['tax_items','transfer_items'].forEach(key=>{
      (S[key]||[]).forEach((it,i)=>{ it.v2023=def(O[key][i].v2023); it.pct=(it.v2023/it.v2018-1)*100; });
    });
  });
  if(d.decile) d.decile.forEach((row,i)=>{ row.net2023=def(src.decile[i].net2023); row.delta=row.net2023-row.net2018; });
  /* recompute the waterfall in real terms: population effect uses the
     unchanged 2018 net/HH; rate effect uses the deflated 2023 net/HH. */
  const wf=d.waterfall;
  wf.start = d.state['2018'].net_bn;
  wf.end   = d.state['2023'].net_bn;
  d.sector_order.forEach(s=>{
    const S=d.sectors[s];
    const nhh18=S.nhh_m['2018'], nhh23=S.nhh_m['2023'];
    const nh18=S.net_hh['2018'], nh23=S.net_hh['2023'];
    const pop=(nhh23-nhh18)*nh18/1000;
    const rate=(nh23-nh18)*nhh23/1000;
    wf.sectors[s]={pop,rate,total:pop+rate};
  });
  return d;
}
const DATA_REAL = buildReal(DATA, CPI);

/* one shared sector selection across both dashboard tabs */
let SECTOR = DATA.sector_order[0];
const MODES = [
  {sfx:'',  data:DATA,      note:''},
  {sfx:'R', data:DATA_REAL, note:`כל ערכי השקל מוצגים ב<b>₪ ריאלי 2018</b>: נתוני 2023 הומרו למחירי 2018 לפי עליית מדד המחירים לצרכן המצטברת של ${((CPI-1)*100).toFixed(1)}%. עמודת 2018 נותרת ללא שינוי, כך שכל שינוי שמוצג כאן הוא שינוי <b>ריאלי</b>.`}
];

    <p class="cap">כל מגזר מפורק ל<b>אפקט אוכלוסייה</b> (יותר / פחות משקי בית, לפי השיעור הנטו הישן) ו<b>אפקט שיעור</b> (שינוי ₪ נטו למשק בית, לפי מספר משקי הבית הנוכחי). ₪ מיליארד.</p>

document.getElementById('tab-dash').innerHTML = dashMarkup(MODES[0].sfx, MODES[0].note, MODES[0].data);
document.getElementById('tab-real').innerHTML = dashMarkup(MODES[1].sfx, MODES[1].note, MODES[1].data);

/* ============ HERO 0 : per-household net balance (diverging) ============ */
function hexA(hex, a){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function heroLabelPlugin(){
  return {
    id:'heroLabels',
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      chart.data.datasets.forEach((ds,di)=>{
        const meta = chart.getDatasetMeta(di);
        const bold = ds.__year==='2023';
        ctx.save();
        ctx.font = bold ? '700 13px "Arial","Helvetica Neue",sans-serif' : '600 11px "Arial","Helvetica Neue",sans-serif';
        ctx.fillStyle = bold ? col('--ink') : col('--muted');
        meta.data.forEach((bar,i)=>{
          const val = ds.data[i];
          const label = fmtSignK(val);
          const pos = bar.tooltipPosition ? bar.tooltipPosition() : {x:bar.x,y:bar.y};
          const positive = val>=0;
          ctx.textAlign = positive ? 'left' : 'right';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, pos.x + (positive?8:-8), pos.y);
        });
        ctx.restore();
      });
    }
  };
}
function buildHero(data, sfx){
  const posC = col('--pos'), negC = col('--neg');
  const sectors = data.sector_order;
  const v18 = sectors.map(s=> data.sectors[s].net_hh['2018']/12);
  const v23 = sectors.map(s=> data.sectors[s].net_hh['2023']/12);
  const maxAbs = Math.max(...v18.map(Math.abs), ...v23.map(Math.abs));
  const pad = maxAbs*0.6;
  new Chart(document.getElementById('hero'+sfx),{
    type:'bar',
    data:{ labels: sectors.map(s=>SECTOR_NAMES[s]||s),
      datasets:[
        {label:'2018', __year:'2018', data:v18,
          backgroundColor:v18.map(v=>hexA(v>=0?posC:negC,0.35)), borderRadius:3, barThickness:11},
        {label:'2023', __year:'2023', data:v23,
          backgroundColor:v23.map(v=>v>=0?posC:negC), borderRadius:4, barThickness:24},
      ]},
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      layout:{padding:{left:66,right:66,top:4,bottom:4}},
      plugins:{ legend:{display:false},
        tooltip:{callbacks:{ label:it => it.dataset.label+': '+fmtSignK(it.raw)+'/חודש' }}},
      scales:{
        x:{ min:-(maxAbs+pad), max:(maxAbs+pad),
          grid:{ color: c=> c.tick.value===0 ? col('--ink') : col('--line'),
                 lineWidth: c=> c.tick.value===0 ? 2 : 1 },
          ticks:{ display:false } },
        y:{ grid:{display:false}, ticks:{ font:{size:13,weight:'700'}, color:col('--ink') } }
      }},
    plugins:[heroLabelPlugin()]
  });
}

/* ============ HERO 1 : waterfall ============ */
function wlabel(sector, eff){ return [(SECTOR_NAMES[sector]||sector), eff]; }
function buildWaterfall(data, sfx){
  const wf = data.waterfall;
  const steps = [];
  steps.push({label:['2018'],type:'anchor',val:wf.start});
  data.sector_order.forEach(s=>{
    const v = wf.sectors[s];
    steps.push({label:wlabel(s,'משקי בית'),type:'flow',val:v.pop});
    steps.push({label:wlabel(s,'נטו/משק בית'),type:'flow',val:v.rate});
  });
  steps.push({label:['2023'],type:'anchor',val:wf.end});
  let cum=0; const bars=[], fills=[], bords=[];
  steps.forEach(st=>{
    if(st.type==='anchor'){ bars.push([0,st.val]); fills.push(col('--navy')); bords.push(col('--navy')); cum=st.val; }
    else { const start=cum, end=cum+st.val; bars.push([start,end]); cum=end;
      const c = st.val>=0?col('--pos'):col('--neg'); fills.push(c); bords.push(c); }
  });
  new Chart(document.getElementById('wf'+sfx),{
    type:'bar',
    data:{ labels:steps.map(s=>s.label),
      datasets:[{ data:bars, backgroundColor:fills, borderColor:bords, borderWidth:1, borderRadius:3, barPercentage:.72, categoryPercentage:.84 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{callbacks:{ title:it=>{const s=steps[it[0].dataIndex];return (Array.isArray(s.label)?s.label.join(' · '):s.label);},
          label:it=>{const s=steps[it.dataIndex]; if(s.type==='anchor')return 'מאזן נטו: '+fmtBnPlain(s.val);
            return (s.val>=0?'מוסיף ':'מסיר ')+fmtBnPlain(Math.abs(s.val));}}}},
      scales:{ x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:false,font:{size:10}}},
        y:{grid:{color:col('--line')},ticks:{callback:v=>'₪'+v+'B'},title:{display:true,text:'מאזן פיסקלי נטו · ₪ מיליארד'}}}}
  });
}

/* ============ gap callout : distance vs Jewish non-Haredi ============ */
function gapBlock(name, g23, g18){

    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px">
      <div class="nm">${name}</div>

    <div class="g18">2018: ${fmtK(g18)}</div>
    <div class="lbl">בהשוואה ליהודים לא-חרדים</div>
  </div>`;
}
function renderGap(data, sfx){
  const jnh = data.sectors['Jewish non-Haredi'].net_hh;
  const html = ['Haredi','Arab'].map(s=>{
    const sec = data.sectors[s].net_hh;
    const g23 = (jnh['2023'] - sec['2023'])/12;
    const g18 = (jnh['2018'] - sec['2018'])/12;
    return gapBlock(SECTOR_NAMES[s]||s, g23, g18);

/* ============ drill-down : financial table ============ */
function chgCell(p){ const cls = p>=0?'chg-pos':'chg-neg'; return `<td class="${cls}">${fmtPct(p)}</td>`; }
function rows(items, total23, cls){
  return items.map(i=>{
    return `<tr class="${cls}">
      <td class="rght">${ITEM_NAMES[i.name]||i.name}</td>
      <td>${fmtKm(i.v2018)}</td>
      <td>${fmtKm(i.v2023)}</td>
      ${chgCell(i.pct)}
    </tr>`;
  }).join('');
}
function totRow(label, t18, t23){
  const pct = (t23/t18 - 1) * 100;
  return `<tr class="tot">
    <td class="rght">${label}</td>
    <td>${fmtKm(t18)}</td>
    <td>${fmtKm(t23)}</td>
    ${chgCell(pct)}
  </tr>`;
}
function netRow(n18, n23){
  /* net = tax − transfer; % change relative to magnitude (positive = improved fiscal position). */
  const pct = (n23 - n18) / Math.abs(n18) * 100;
  const cell = v => `<td style="color:${v>=0?col('--pos'):col('--neg')}">${fmtSignKm(v)}</td>`;
  return `<tr class="tot" style="background:#f4f6f8">
    <td class="rght">פיסקלי נטו · מיסים פחות העברות</td>
    ${cell(n18)}
    ${cell(n23)}
    ${chgCell(pct)}
  </tr>`;
}
function renderTable(data, sfx){
  const sec = data.sectors[SECTOR];
  const html = `<table class="fintbl">
    <thead><tr>
      <th class="rght">סעיף · לחודש למשק בית</th>
      <th>2018</th><th>2023</th><th>Δ %</th>
    </tr></thead>
    <tbody>
      <tr class="secthead t-in"><td colspan="4">מיסים ששולמו</td></tr>
      ${rows(sec.tax_items, sec.tax_hh['2023'], 'grp-in')}
      ${totRow('סך מיסים', sec.tax_hh['2018'], sec.tax_hh['2023'])}
      <tr class="secthead t-out"><td colspan="4">העברות שהתקבלו</td></tr>
      ${rows(sec.transfer_items, sec.transfer_hh['2023'], 'grp-out')}
      ${totRow('סך העברות', sec.transfer_hh['2018'], sec.transfer_hh['2023'])}
      ${netRow(sec.net_hh['2018'], sec.net_hh['2023'])}
    </tbody></table>`;
  document.getElementById('ioTable'+sfx).innerHTML = html;
}

/* ============ demo card ============ */
function earnHTML(e){
  const seg=(w,c)=>`<i style="width:${w}%;background:${c}"></i>`;
  return `<div class="earnbar">${seg(e['0'],col('--grey'))}${seg(e['1'],col('--amber-soft'))}${seg(e['2plus'],col('--blue'))}</div>
   <div class="earnleg"><span><span class="dot" style="background:${col('--grey')}"></span>0 מפרנסים <b>${e['0'].toFixed(0)}%</b></span>
   <span><span class="dot" style="background:${col('--amber-soft')}"></span>1 <b>${e['1'].toFixed(0)}%</b></span>
   <span><span class="dot" style="background:${col('--blue')}"></span>2+ <b>${e['2plus'].toFixed(0)}%</b></span></div>`;
}
function metric(k, big, small, unit){
  const sm = (small===null||small===undefined)?'n/a':small;
  return `<div class="metric"><div class="k">${k}</div>
    <div class="v">${big}<small>${sm}</small></div>
    <div class="cap" style="margin:2px 0 0;text-align:right">${unit}</div></div>`;
}
function renderDemo(data, sfx){
  const sec=data.sectors[SECTOR], d=sec.demo;
  document.getElementById('demoTitle'+sfx).textContent = (SECTOR_NAMES[SECTOR]||SECTOR) + ' — פרופיל מגזר';
  document.getElementById('netBig'+sfx).textContent = fmtSignKm(sec.net_hh['2023']);
  document.getElementById('netBig'+sfx).style.color = sec.net_hh['2023']>=0?col('--pos'):col('--neg');
  const p65b = d.pct65head['2023'], p65s=d.pct65head['2018'];
  const grid=document.getElementById('demoGrid'+sfx);
  grid.innerHTML =
     metric('הכנסה נטו / משק בית', fmtK(d.income_m['2023']), fmtK(d.income_m['2018']), 'NIS / חודש')
   + metric('נפשות / משק בית', d.persons['2023'].toFixed(2), d.persons['2018'].toFixed(2), 'גודל משק בית ממוצע')
   + metric('ילדים מתחת ל-18 / משק בית', d.kids['2023'].toFixed(2), d.kids['2018'].toFixed(2), 'ילדים מתחת לגיל 18 למשק בית')
   + metric('ראש משק בית גיל 65+', (p65b===null?'n/a':p65b.toFixed(0)+'%'), (p65s===null?null:p65s.toFixed(0)+'%'), 'שיעור ממשקי הבית')
   + `<div class="metric" style="grid-column:1/3"><div class="k">מפרנסים למשק בית · 2023</div>${earnHTML(d.earners['2023'])}</div>`;
}
